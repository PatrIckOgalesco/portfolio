<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Chatbot</title>
  <link rel="stylesheet" href="www/style.css">
  <link rel="stylesheet" href="www/nav.css">
  <link rel="stylesheet" href="www/popup.css">
  <link rel="stylesheet" href="www/predictive-text.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/boxicons/2.0.7/css/boxicons.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <script src="www/script.js" defer></script>
  <script src="www/server.js" defer></script>
  <script src="www/theme.js" defer></script>
  <script src="www/predictive-text.js" defer></script>
  <script src="www/nav.js" defer></script>
  <script src="www/popup.js" defer></script>
</head>
<body>

  <nav class="top-nav">
    <button id="nav-btn" class="material-symbols-rounded">menu</button>
    <nav>
      <button id="theme-btn" class="material-symbols-rounded">light_mode</button>
    </nav>
  </nav>

  <section class="sidebar close">
    <div class="menu-bar">
      <div class="menu">
        <ul class="menu-links">
          <li class="nav-link">
            <a href="#">
              <i class='bx bx-info-circle'></i> About
            </a>
          </li>
          <li class="nav-link">
            <a href="#">
              <i class='bx bx-code-alt'></i> About Us
            </a>
          </li>
          <li class="nav-link">
            <a href="#">
              <i class='bx bx-message-square-dots'></i> Contact
            </a>
          </li>
        </ul>
      </div>
    </div>
  </section>


  <div class="container">
  <div class="chat-container">Chat content goes here</div>
  <div class="typing-container">
    <div class="suggestion-container">
      <span id="suggestion"></span>
    </div>
    <div class="typing-textarea">
      <textarea id="chat-input" spellcheck="false" placeholder="Enter a prompt here" required></textarea>
      <span id="send-btn" class="material-symbols-rounded">send</span>
    </div>
    <div class="typing-controls">
      <!-- <span id="send-btn" class="material-symbols-rounded">send</span> -->
      <span id="delete-btn" class="material-symbols-rounded">delete</span>
    </div>
  </div>
</div>

  <!-- Admin pop-up section -->
  <section class="admin-popup" id="admin-popup">
    <form class="form" data-form method="post">
      <textarea name="message" class="form-input" placeholder="Question"></textarea> <!-- required data-form-input -->
      <textarea name="message" class="form-input" placeholder="Answer"></textarea>
      <button class="form-btn" type="submit" disabled data-form-btn>
        <ion-icon name="paper-plane"></ion-icon>
        <span>SAVE</span>
      </button>

      <button id="close-admin-popup" class="form-btn close-button">
         <ion-icon name="close"></ion-icon>
         <span>CLOSE</span>
      </button>

    </form>
  </section>
</body>
</html>
